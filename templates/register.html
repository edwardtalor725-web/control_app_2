{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="mobile-container" style="max-width:420px;margin:0 auto;padding-top:40px;">
    <div class="text-center mb-5">
        <div style="width:80px;height:80px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:var(--radius-xl);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 12px 40px rgba(79,70,229,0.25);">
            <i class="fas fa-user-plus fa-2x text-white"></i>
        </div>
        <h1 class="mobile-h1 mb-2">Регистрация</h1>
        <p class="text-muted">Создайте новый аккаунт</p>
    </div>

    <div class="mobile-card" style="box-shadow:var(--shadow-lg);">
        <form method="post" action="{{ url_for('register') }}">
            <div class="mb-4">
                <label class="form-label">
                    <i class="fas fa-user me-2" style="color:var(--primary);"></i>Имя пользователя
                </label>
                <input type="text" class="mobile-input" name="username" required>
            </div>
            <div class="mb-4">
                <label class="form-label">
                    <i class="fas fa-envelope me-2" style="color:var(--primary);"></i>Email
                </label>
                <input type="email" class="mobile-input" name="email" required>
            </div>
            <div class="mb-4">
                <label class="form-label">
                    <i class="fas fa-key me-2" style="color:var(--primary);"></i>Пароль
                </label>
                <input type="password" class="mobile-input" name="password" required>
            </div>
            <div class="mb-4">
                <label class="form-label">
                    <i class="fas fa-shield-alt me-2" style="color:var(--primary);"></i>Роль
                </label>
                <select class="mobile-input" name="role">
                    <option value="manager">Менеджер</option>
                    <option value="accountant">Бухгалтер</option>
                    <option value="owner">Владелец</option>
                </select>
            </div>
            <button type="submit" class="mobile-btn mobile-btn-primary">
                <i class="fas fa-user-plus me-2"></i>Зарегистрироваться
            </button>
        </form>
        <div class="text-center mt-4">
            <a href="{{ url_for('login') }}" style="color:var(--primary);text-decoration:none;font-weight:500;">
                Уже есть аккаунт? Войти
            </a>
        </div>
    </div>
</div>
{% endblock %}
