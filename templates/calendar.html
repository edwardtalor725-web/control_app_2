{% extends "base.html" %}
{% block title %}Календарь платежей{% endblock %}

{% block content %}
<div class="mobile-container">
    <h1 class="mobile-h2 mb-4">
        <i class="fas fa-calendar-alt me-2" style="color:var(--primary);"></i>Платежный календарь
    </h1>

    <div class="mobile-card">
        <div id="calendar"></div>
    </div>

    <div class="mobile-card mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="mobile-h4 mb-0">
                <i class="fas fa-clock me-2" style="color:var(--primary);"></i>Предстоящие операции
            </h5>
        </div>
        <div class="table-responsive-mobile">
            <table class="mobile-table">
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Тип</th>
                        <th>Сумма</th>
                        <th>Категория</th>
                    </tr>
                </thead>
                <tbody id="plannedOperations">
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
<style>
.fc-toolbar-title{font-size:1.1rem!important;font-weight:600!important;}
.fc-button{padding:6px 12px!important;border-radius:var(--radius)!important;font-size:0.85rem!important;}
.fc-event{border-radius:var(--radius)!important;font-size:0.8rem!important;padding:2px 6px!important;}
.fc-daygrid-day-number{font-size:0.85rem!important;}
.fc-col-header-cell{font-size:0.8rem!important;font-weight:600!important;}
</style>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/ru.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const eventsData = {{ events|safe }} || [];
    const calendarEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'ru',
        events: eventsData,
        eventColor: '#4f46e5',
        eventTextColor: '#ffffff',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,listWeek'
        },
        buttonText: {
            today: 'Сегодня',
            month: 'Месяц',
            list: 'Список'
        }
    });
    calendar.render();

    const tbody = document.getElementById('plannedOperations');
    eventsData.forEach(event => {
        const row = document.createElement('tr');
        const date = event.start ? new Date(event.start).toLocaleDateString('ru-RU') : '';
        const type = (event.title || '').split(':')[0] || '';
        const descPart = (event.title || '').split(':')[1] || '';
        const category = descPart.split('-')[0] || '';
        const amountMatch = (event.title || '').match(/\d+[.,]?\d*/g);
        const amount = amountMatch ? amountMatch.pop() : '0';
        const isIncome = (event.color === 'green');

        row.innerHTML = `
            <td style="font-weight:500;">${date}</td>
            <td><span class="status-badge ${isIncome ? 'status-income' : 'status-expense'}">${type}</span></td>
            <td style="font-weight:700;color:${isIncome ? 'var(--success)' : 'var(--danger)'};">${amount} ₽</td>
            <td style="color:var(--gray);font-size:0.9rem;">${category}</td>
        `;
        tbody.appendChild(row);
    });
});
</script>
{% endblock %}
