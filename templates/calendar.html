{% extends "base.html" %}
{% block title %}Календарь платежей{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5>Платежный календарь</h5>
    </div>
    <div class="card-body">
        <div id="calendar"></div>
    </div>
</div>

<div class="card mt-4">
    <div class="card-header">
        <h5>Предстоящие операции</h5>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Тип</th>
                        <th>Сумма</th>
                        <th>Категория</th>
                        <th>Описание</th>
                    </tr>
                </thead>
                <tbody id="plannedOperations">
                    <!-- Данные загружаются через JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/ru.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Инициализация календаря
    const calendarEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'ru',
        events: {{ events|safe }},
        eventColor: '#3788d8',
        eventTextColor: '#ffffff'
    });
    calendar.render();
    
    // Загрузка запланированных операций
    fetch('/calendar')
        .then(response => response.text())
        .then(html => {
            // Парсим HTML для получения данных
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const events = JSON.parse(doc.querySelector('#eventsData')?.textContent || '[]');
            
            // Отображаем в таблице
            const tbody = document.getElementById('plannedOperations');
            events.forEach(event => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${new Date(event.start).toLocaleDateString('ru-RU')}</td>
                    <td><span class="badge bg-${event.color}">${event.title.split(':')[0]}</span></td>
                    <td>${event.title.match(/\d+/g)?.pop() || 0} руб.</td>
                    <td>${event.title.split(':')[1]?.split('-')[0] || ''}</td>
                    <td>${event.title}</td>
                `;
                tbody.appendChild(row);
            });
        });
});
</script>
{% endblock %}
