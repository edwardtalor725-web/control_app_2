{% extends "base.html" %}
{% block title %}Редактирование операции{% endblock %}

{% block content %}
<div class="mobile-container" style="max-width:720px;margin:0 auto;">
    <h1 class="mobile-h2 mb-4">
        <i class="fas fa-pen me-2" style="color:var(--primary);"></i>Редактирование операции
    </h1>

    <div class="mobile-card">
        <form method="post">
            <div class="row g-3">
                <div class="col-6">
                    <label class="form-label">Тип</label>
                    <select name="type" class="mobile-input">
                        <option value="income" {% if operation.type == 'income' %}selected{% endif %}>Доход</option>
                        <option value="expense" {% if operation.type == 'expense' %}selected{% endif %}>Расход</option>
                    </select>
                </div>
                <div class="col-6">
                    <label class="form-label">Сумма (₽)</label>
                    <input type="number" name="amount" class="mobile-input" value="{{ operation.amount }}" step="0.01" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Категория</label>
                    <select name="category" class="mobile-input">
                        {% for type, cats in categories.items() %}
                        <optgroup label="{{ 'Доходы' if type == 'income' else 'Расходы' }}">
                            {% for c in cats %}
                            <option value="{{ c }}" {% if operation.category == c %}selected{% endif %}>{{ c }}</option>
                            {% endfor %}
                        </optgroup>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Дата</label>
                    <input type="date" name="date" class="mobile-input" value="{{ operation.date }}" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Описание</label>
                    <textarea name="description" class="mobile-input" rows="3" placeholder="Краткое описание операции">{{ operation.description }}</textarea>
                </div>
            </div>
            <div class="mt-4 d-flex gap-3 justify-content-end">
                <a href="/operations" class="btn btn-light rounded-pill px-4">Отмена</a>
                <button type="submit" class="btn btn-primary rounded-pill px-4">
                    <i class="fas fa-save me-2"></i>Сохранить
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
